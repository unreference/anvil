name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: [ self-hosted, windows ]

    strategy:
      matrix:
        config: [ Debug, Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          -DANVIL_BUILD_NUMBER=${{ github.run_number }}

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anvil-${{ matrix.config }}
          path: build/${{ matrix.config }}/Anvil.exe
